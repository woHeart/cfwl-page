name: page CI/CD

on:
  push:
    branches: [main]

jobs:
  ci-cd:
    runs-on: self-hosted

    steps:
      # Checkout the code from the repository 
      - name: Checkout code
        uses: actions/checkout@v4

     # Set up Node.js environment for Vue and React linting
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0

      - name: Lint Vue
        run: |
          cd Vue
          npm ci
          npm run lint --if-present

      - name: Lint React
        run: |
          cd React
          npm ci
          npm run lint --if-present

      - name: Lint Express
        run: |
          cd Express
          npm ci
          npm run lint --if-present

      - name: Check FastAPI (ruff + format)
        run: |
          cd Fastapi
          pip install ruff
          ruff check . --fix
          ruff format --check .

      - name: Deploy locally
        run: |
          cd D:\user-cfwl
          git pull origin main
          docker compose up --build -d
          docker image prune -f
        shell: powershell